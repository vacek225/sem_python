services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sem_db}
      POSTGRES_USER: ${POSTGRES_USER:-sem_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sem_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sem_user} -d ${POSTGRES_DB:-sem_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  fastapi:
    build:
      context: .
      dockerfile: docker/fastapi/Dockerfile
    environment:
      MODEL_PATH: /app/models/iris_model.joblib
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - model_data:/app/models

  flask:
    build:
      context: .
      dockerfile: docker/flask/Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sem_user}:${POSTGRES_PASSWORD:-sem_password}@db:5432/${POSTGRES_DB:-sem_db}
      FASTAPI_URL: http://fastapi:8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      fastapi:
        condition: service_started

volumes:
  postgres_data:
  model_data:
